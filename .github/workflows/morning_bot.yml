name: Morning Briefing Bot Telegram

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  esegui_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4  # Aggiornato a v4
        
      - name: Installa Python
        uses: actions/setup-python@v5 # Aggiornato a v5
        with:
          python-version: '3.10'
          
      - name: Installa Librerie
        run: pip install -r requirements.txt
        
      - name: Avvia il Bot 🚀
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python bot_cron.py
