name: Morning Briefing Bot Telegram

on:
  schedule:
    # 05:30 UTC corrisponde alle 07:30 Ora Italiana (CEST)
    - cron: '30 5 * * *'
  workflow_dispatch: # Questo ti permette di cliccare un tasto "Run" per testarlo quando vuoi

jobs:
  esegui_bot:
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v3
        
      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Installa Librerie
        run: pip install -r requirements.txt
        
      - name: Avvia il Bot 🚀
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python bot_cron.py
